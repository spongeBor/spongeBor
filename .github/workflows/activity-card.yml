name: Update activity card

on:
  schedule:
    # Every day at 09:10 Asia/Shanghai (01:10 UTC)
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-activity-card
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Generate light and dark activity cards
        run: node .github/scripts/generate-activity-card.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: spongeBor

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-activity-light.svg assets/github-activity-dark.svg
          git diff --cached --quiet || git commit -m "chore: update profile activity card"
          git push
